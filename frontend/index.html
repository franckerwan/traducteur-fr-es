<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Traducteur instantané Français - Espagnol avec détection automatique">
    <meta name="theme-color" content="#f39c12">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Traducteur">
    <title>Traducteur FR - ES</title>
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main id="app" role="main">
        <header>
            <h1>Traducteur <span class="flag" aria-label="Français">FR</span> <span class="arrow" aria-hidden="true">&#8596;</span> <span class="flag" aria-label="Espagnol">ES</span></h1>
            <p class="subtitle">Traduction instantanée Français - Espagnol</p>
        </header>

        <div id="translator" role="region" aria-label="Zone de traduction">
            <div class="panel input-panel">
                <div class="panel-header">
                    <label id="input-lang" for="input-text">Texte source</label>
                    <button id="btn-lang-toggle" class="btn-lang" title="Changer la langue vocale" aria-label="Changer la langue vocale : actuellement Français">FR</button>
                </div>
                <textarea id="input-text" placeholder="Écris en français ou en espagnol..." autofocus aria-labelledby="input-lang"></textarea>
                <div class="panel-footer">
                    <span id="char-count" aria-live="polite" aria-atomic="true">0</span>
                    <div class="actions" role="toolbar" aria-label="Actions sur le texte source">
                        <button id="btn-mic" class="btn-circle" title="Dicter" aria-label="Activer la dictée vocale">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                                <line x1="12" y1="19" x2="12" y2="23"/>
                                <line x1="8" y1="23" x2="16" y2="23"/>
                            </svg>
                        </button>
                        <button id="btn-clear" class="btn-circle" title="Effacer" aria-label="Effacer le texte">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                <line x1="18" y1="6" x2="6" y2="18"/>
                                <line x1="6" y1="6" x2="18" y2="18"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <button id="btn-translate" class="btn-translate" title="Traduire" aria-label="Lancer la traduction">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>

            <div class="panel output-panel">
                <div class="panel-header">
                    <span id="output-lang">Traduction</span>
                </div>
                <div id="output-text" class="output-area" role="status" aria-live="polite" aria-label="Résultat de la traduction">
                    <span class="placeholder">La traduction apparaitra ici...</span>
                </div>
                <div class="panel-footer">
                    <span id="translation-time" aria-live="polite"></span>
                    <div class="actions" role="toolbar" aria-label="Actions sur la traduction">
                        <button id="btn-copy" class="btn-circle" title="Copier" aria-label="Copier la traduction" style="display:none;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                            </svg>
                        </button>
                        <button id="btn-speak" class="btn-circle" title="Lire" aria-label="Lire la traduction à voix haute" style="display:none;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <section id="history-section" aria-label="Historique des traductions">
            <div class="section-header">
                <h2>Historique</h2>
                <button id="btn-clear-history" class="btn-small" title="Effacer l'historique" aria-label="Effacer tout l'historique">Effacer</button>
            </div>
            <ul id="history-list" aria-label="Liste des traductions précédentes"></ul>
        </section>
    </main>

    <div id="recording-indicator" role="alert" aria-live="assertive" style="display:none;">
        <div class="recording-pulse" aria-hidden="true"></div>
        <span>Dictée en cours...</span>
    </div>

    <script src="/static/app.js" defer></script>
    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/static/sw.js");
        }
    </script>
</body>
</html>
